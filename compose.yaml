services:
  personal-ops-hub:
    build: .
    container_name: personal-ops-hub
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      OPS_DB_PATH: /data/ops-hub.db
      PORT: 8080
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./data:/data
      # Enable Docker container checks only if the runtime image has Docker CLI available.
      # - /var/run/docker.sock:/var/run/docker.sock:ro
